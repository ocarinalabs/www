<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="currentColor">
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="currentColor" stroke-width="16"/>
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="currentColor" stroke-width="12"/>
  <!-- Center dot pattern (ocarina-inspired) -->
  <circle cx="200" cy="200" r="24"/>
  <circle cx="200" cy="130" r="16"/>
  <circle cx="260" cy="170" r="16"/>
  <circle cx="260" cy="230" r="16"/>
  <circle cx="200" cy="270" r="16"/>
  <circle cx="140" cy="230" r="16"/>
  <circle cx="140" cy="170" r="16"/>
  <!-- Cross lines -->
  <line x1="200" y1="20" x2="200" y2="80" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="320" x2="200" y2="380" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
  <line x1="20" y1="200" x2="80" y2="200" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
  <line x1="320" y1="200" x2="380" y2="200" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
</svg>
